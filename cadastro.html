<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador Avançado de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="conteiner">
    <section class="cartao">
      <h1>Gerenciador Avançado de Tarefas</h1>

      <form id="form-tarefa" class="form-tarefa">
        <div class="caixa-erro" id="caixa-erro"></div>

        <label for="titulo">Título *</label>
        <input type="text" id="titulo" name="titulo">

        <label for="descricao">Descrição</label>
        <textarea id="descricao" name="descricao" rows="3"></textarea>

        <label for="prioridade">Prioridade</label>
        <select id="prioridade" name="prioridade">
          <option value="Baixa">Baixa</option>
          <option value="Média">Média</option>
          <option value="Alta">Alta</option>
        </select>

        <label for="data-limite">Data limite</label>
        <input type="date" id="data-limite" name="data-limite">

        <label for="situacao">Status</label>
        <select id="situacao" name="situacao">
          <option value="Pendente">Pendente</option>
          <option value="Concluída">Concluída</option>
        </select>

        <div id="area-observacao-dinamica"></div>

        <div class="linha-botoes">
          <button type="button" id="btn-observacao" class="secundario">+ Observação</button>
          <button type="submit" id="btn-concluir">Concluir</button>
        </div>
      </form>

      <section id="area-tabela" class="area-tabela"></section>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
